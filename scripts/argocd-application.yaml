apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canary-demo
  namespace: argocd
spec:
  project: default
  source:
    # Update this to your fork/repo URL
    repoURL: https://github.com/bullet-ant/k8s-canary-delivery-platform.git
    targetRevision: HEAD
    path: charts/canary-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
