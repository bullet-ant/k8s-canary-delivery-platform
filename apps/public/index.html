<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Canary Live Traffic</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <h1>Canary Live Traffic</h1>
    <div class="controls">
      <div class="legend" id="legend-items">
        <!-- populated dynamically by app.js -->
        <span class="legend-dot legend-error"></span> ERROR
      </div>
      <div class="control-buttons">
        <button id="btn-toggle" class="btn" title="Pause / Resume">Pause</button>
        <select id="rate-select" class="btn" title="Requests per second">
          <option value="1">1 req/s</option>
          <option value="5">5 req/s</option>
          <option value="10" selected>10 req/s</option>
          <option value="20">20 req/s</option>
        </select>
        <div id="canary-badge" class="error-badge"></div>
        <select id="canary-error-select" class="btn" title="Canary error injection rate">
          <option value="0" selected>0% err</option>
          <option value="5">5% err</option>
          <option value="10">10% err</option>
          <option value="25">25% err</option>
          <option value="50">50% err</option>
          <option value="100">100% err</option>
        </select>
      </div>
    </div>
  </header>

  <main>
    <!-- Flowing bubble stream -->
    <section class="bubble-section">
      <h2 class="section-label">Live Request Stream</h2>
      <div id="bubble-stream" class="bubble-stream"></div>
    </section>

    <!-- Summary -->
    <section class="summary-section">
      <h2 class="section-label">Traffic Split <span class="section-label-note">· last 60s</span></h2>
      <div class="summary-body">
      <div class="summary-row" id="stat-cards">
        <!-- slot 0 and slot 1 populated dynamically; total is always present -->
        <div class="stat-card stat-total">
          <span class="stat-label">TOTAL</span>
          <span id="count-total" class="stat-value">0</span>
          <span class="stat-pct">&nbsp;</span>
        </div>
      </div>

      <div class="proportion-bar" id="proportion-bar">
        <!-- bar segments populated dynamically -->
      </div>
      <div class="bar-labels" id="bar-labels">
        <!-- bar labels populated dynamically -->
      </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
