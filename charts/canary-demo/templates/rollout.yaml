apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        {{- if .Values.prometheus.scrape }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.port }}"
        prometheus.io/path: "/metrics"
        {{- end }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: PORT
              value: "{{ .Values.port }}"
            - name: VERSION
              value: "{{ .Values.image.tag }}"
            - name: ROLE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['role']
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
  strategy:
    canary:
      stableMetadata:
        labels:
          role: {{ .Values.stable.role }}
      canaryMetadata:
        labels:
          role: {{ .Values.canary.role }}
      canaryService: {{ .Release.Name }}-canary
      stableService: {{ .Release.Name }}-stable
      trafficRouting:
        nginx:
          stableIngress: {{ .Release.Name }}
      steps:
        - setWeight: 20
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: {{ .Release.Name }}-success-rate
        - setWeight: 50
        - pause: { duration: 60s }
        - analysis:
            templates:
              - templateName: {{ .Release.Name }}-success-rate
        - setWeight: 100
