name: CI — Build, Scan, Push

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/canary-demo
  CHART_VALUES: charts/canary-demo/values.yaml

permissions:
  contents: write
  packages: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag from git tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: apps
          load: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.version }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.tag.outputs.version }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: apps
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.version }}
            ${{ env.IMAGE }}:latest

      - name: Update image tag in Helm values
        run: |
          sed -i "s|tag:.*|tag: \"${{ steps.tag.outputs.version }}\"|" "${{ env.CHART_VALUES }}"

      - name: Commit updated image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.CHART_VALUES }}"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update image tag to ${{ steps.tag.outputs.version }}"
          git push origin HEAD:main
